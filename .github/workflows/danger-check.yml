name: Danger Change Detection

on:
  pull_request:
    branches: [ main ]

jobs:
  danger-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin "${{ github.event.pull_request.base.ref }}"

      - name: Check dangerous changes
        run: |
          base_ref="origin/${{ github.event.pull_request.base.ref }}"
          git diff --name-only "$base_ref"...HEAD > changed.txt
          if grep -E "(auth|permission|billing|migration|schema|infra|secret|\.env)" changed.txt; then
            echo "❌ Dangerous changes detected. Human review required."
            exit 1
          fi
